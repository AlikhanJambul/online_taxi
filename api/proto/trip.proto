syntax = "proto3";

package trip;

option go_package = "gen/trip-service";

import "google/protobuf/empty.proto";

service TripService {

  // 1. Пассажир создает заявку (ищет машину)
  rpc CreateTrip (CreateTripRequest) returns (TripResponse);

  // 2. Водитель принимает заказ
  rpc AcceptTrip (AcceptTripRequest) returns (TripResponse);

  // 3. Получить инфу по конкретной поездке
  rpc GetTrip (GetTripRequest) returns (TripResponse);

  // 4. Узнать стоимость поездки
  rpc EstimateTrip(EstimateRequest) returns (EstimateResponse);


  // --- Реалтайм (Стриминг) ---

  // 5. Водитель постоянно шлет свои координаты (Client Streaming)
  // Ключевое слово stream в запросе значит, что клиент открывает трубу и пуляет данные
  rpc SendLocation (stream LocationRequest) returns (google.protobuf.Empty);

  // 6. Пассажир слушает перемещения водителя (Server Streaming)
  // Ключевое слово stream в ответе значит, что сервер постоянно отдает данные клиенту
  rpc TrackTrip (TrackRequest) returns (stream LocationResponse);

  // --- Статусы поездки ---

  // 7. Водитель прибыл на место
  rpc DriverArrived (TripIDRequest) returns (TripResponse);

  // 8. Водитель начал поездку
  rpc StartTrip (TripIDRequest) returns (TripResponse);

  // 9. Водитель завершил поездку
  rpc CompleteTrip (TripIDRequest) returns (TripResponse);

  // 10. Отмена поездки (и пассажир и водитель могут отменить)
  rpc CancelTrip (TripIDRequest) returns (TripResponse);

  // 11. Пассажир оставляет отзыв (score передаётся в TripIDRequest.score)
  rpc SubmitReview (TripIDRequest) returns (google.protobuf.Empty);

  // 12. История поездок текущего пользователя
  rpc GetTripHistory (google.protobuf.Empty) returns (TripHistoryResponse);
}

enum TripStatus {
  STATUS_UNSPECIFIED = 0;
  SEARCHING = 1;
  ACCEPTED = 2;
  ARRIVED = 3;
  IN_PROGRESS = 4;
  COMPLETED = 5;
  CANCELLED = 6;
}

message CreateTripRequest {
  string pickup_address = 1;
  string dest_address = 2;
  double pickup_lat = 3;
  double pickup_lng = 4;
  double dest_lat = 5;
  double dest_lng = 6;
  int64 price_kzt = 7;
}

message AcceptTripRequest {
  string trip_id = 1;
}

message GetTripRequest {
  string trip_id = 1;
}

message TripResponse {
  string trip_id = 1;
  string passenger_id = 2;
  string driver_id = 3;
  TripStatus status = 4;
  string pickup_address = 5;
  string dest_address = 6;
  double pickup_lat = 7;
  double pickup_lng = 8;
  double dest_lat = 9;
  double dest_lng = 10;
  int64 price_kzt = 11;
}

message LocationRequest {
  string trip_id = 1;
  double lat = 2;
  double lng = 3;
}

message TrackRequest {
  string trip_id = 1;
}

message LocationResponse {
  double lat = 1;
  double lng = 2;
}

message EstimateRequest {
  double pickup_lat = 1;
  double pickup_lng = 2;
  double dest_lat = 3;
  double dest_lng = 4;
}

message EstimateResponse {
  int32 price_kzt = 1;
  double distance_km = 2;
}

message TripIDRequest {
  string trip_id = 1;
  int32 score = 2; // используется только в SubmitReview, 1..5
}

message TripHistoryItemPb {
  string id = 1;
  string pickup_address = 2;
  string dest_address = 3;
  int64 price_kzt = 4;
  string finished_at = 5;
  string driver_name = 6;
}

message TripHistoryResponse {
  repeated TripHistoryItemPb items = 1;
}