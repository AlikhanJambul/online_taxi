name: online_taxi_mobile
description: Taxi application for passengers and drivers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # gRPC
  grpc: ^5.1.0
  protobuf: ^6.0.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Firebase / Push notifications
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0

  # Maps
  yandex_mapkit: ^3.3.0

  # Device info
  device_info_plus: ^10.1.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Location (GPS)
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # UUID
  uuid: ^4.4.0

  # Image picker & HTTP upload
  image_picker: ^1.1.3
  http: ^1.2.0

  # Image caching
  cached_network_image: ^3.4.1

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
